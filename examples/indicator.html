<button
  @click="$dispatch('load-component-indicator')"
  class="rounded-md bg-violet-400 px-4 py-2 font-semibold text-gray-100"
>
  Load component
</button>

<div
  x-remote-component="/examples/components/component-a.html"
  x-rc:trigger="event 0 300"
  @load-component-indicator.window.stop="_rc.trigger"
>
  <svg
    viewBox="25 25 50 50"
    fill="none"
    class="animate-spinner-rotate h-10 w-10"
    x-show="_rcIsLoadingWithDelay"
  >
    <circle
      cx="50"
      cy="50"
      r="20"
      stroke="currentColor"
      stroke-width="4"
      stroke-miterlimit="10"
      stroke-linecap="round"
      class="animate-spinner-dash"
    />
  </svg>
</div>

<template id="spinner">
  <svg
    viewBox="25 25 50 50"
    fill="none"
    class="animate-spinner-rotate h-10 w-10"
  >
    <circle
      cx="50"
      cy="50"
      r="20"
      stroke="currentColor"
      stroke-width="4"
      stroke-miterlimit="10"
      stroke-linecap="round"
      class="animate-spinner-dash"
    />
  </svg>
</template>

<div
  x-remote-component="/examples/components/component-a.html"
  x-rc:trigger="event 0 300"
  @load-component-indicator.window.stop="_rc.trigger"
>
  <div x-remote-component="#spinner" _x-show="_rcIsLoadingWithDelay"></div>
</div>

<button
  @click="$dispatch('load-component-templates')"
  class="rounded-md bg-violet-400 px-4 py-2 font-semibold text-gray-100"
>
  Load component
</button>

<div
  x-remote-component="/examples/components/component-a.html"
  x-rc:trigger="event"
  x-rc:process-templates-first
  @load-component-templates.window.stop="_rc.trigger"
>
  <template data-template="content">
    <div x-remote-component="/examples/components/component-b.html"></div>
  </template>
</div>

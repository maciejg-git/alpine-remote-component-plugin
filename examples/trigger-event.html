<button
  @click="$dispatch('load-component')"
  class="rounded-md bg-violet-400 px-4 py-2 font-semibold text-gray-100"
>
  Load component
</button>

<div
  x-remote-component="/examples/components/component-a.html"
  x-rc:trigger="event"
  @load-component.window.stop="_rc.trigger"
></div>

<button
  @click="$dispatch('load-component-name', 'a')"
  class="rounded-md bg-violet-400 px-4 py-2 font-semibold text-gray-100"
>
  Load component (A)
</button>
<button
  @click="$dispatch('load-component-name', 'b')"
  class="rounded-md bg-violet-400 px-4 py-2 font-semibold text-gray-100"
>
  Load component (B)
</button>

<div
  x-remote-component="/examples/components/component-a.html"
  x-rc:trigger="event"
  @load-component-name.window.stop="$event.detail === 'a' && _rc.trigger"
></div>
<div
  x-remote-component="/examples/components/component-b.html"
  x-rc:trigger="event"
  @load-component-name.window.stop="$event.detail === 'b' && _rc.trigger"
></div>

<div
  x-remote-component="/examples/components/component-a.html"
  x-rc:trigger="event"
  @load-component.stop="_rc.trigger"
>
  <button
    @click="$dispatch('load-component')"
    class="rounded-md bg-violet-400 px-4 py-2 font-semibold text-gray-100"
  >
    Load component
  </button>
</div>
